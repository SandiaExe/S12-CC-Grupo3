<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List - Grupo 3</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 350px; }
        h1 { text-align: center; color: #333; }
        .input-area { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
        ul { list-style: none; padding: 0; }
        li { padding: 10px; background: #eee; margin-bottom: 8px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .delete-btn { background-color: #dc3545; padding: 4px 8px; font-size: 12px; }
        .delete-btn:hover { background-color: #c82333; }
    </style>
</head>
<body>

<div class="container">
    <h1>Lista de Tareas</h1>
    <div class="input-area">
        <input type="text" id="taskInput" placeholder="Nueva tarea...">
        <button onclick="addTask()">Agregar</button>
    </div>
    <ul id="taskList"></ul>
</div>

<script>
    // IMPORTANTE: Como el Frontend corre en el navegador del usuario, 
    // se comunica con el Backend usando 'localhost' y el puerto que exponga el Backend.
    const API_URL = 'http://localhost:5000/tasks';

    // Cargar tareas al iniciar
    async function loadTasks() {
        try {
            const response = await fetch(API_URL);
            const tasks = await response.json();
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            tasks.forEach(task => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${task.title}</span>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">X</button>
                `;
                list.appendChild(li);
            });
        } catch (error) {
            console.error("Error cargando tareas:", error);
        }
    }

    // Agregar una nueva tarea
    async function addTask() {
        const input = document.getElementById('taskInput');
        if (!input.value.trim()) return;

        try {
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: input.value })
            });
            input.value = '';
            loadTasks();
        } catch (error) {
            console.error("Error agregando tarea:", error);
        }
    }

    // Eliminar una tarea
    async function deleteTask(id) {
        try {
            await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            loadTasks();
        } catch (error) {
            console.error("Error eliminando tarea:", error);
        }
    }

    // Inicializar
    loadTasks();
</script>
</body>
</html>
