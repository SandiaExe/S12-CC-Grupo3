version: '3.8'

services:
  # --- CAPA 1: BASE DE DATOS ---
  mi-base-datos:
    image: boris_usuario/todo-db:latest # Cambiar por el de Boris
    environment:
      POSTGRES_DB: tareas_db
      POSTGRES_USER: tu_usuario
      POSTGRES_PASSWORD: tu_password
    networks:
      - red-aplicacion

  # --- CAPA 2: BACKEND ---
  mi-backend:
    image: cuenta_integrante2/mi-api-python:latest # Cambiar por el de tu compañero
    ports:
      - "5000:5000" # 🌟 ¡OBLIGATORIO! Exponer el puerto para que el navegador del usuario pueda llegar al API
    environment:
      DB_HOST: mi-base-datos 
      DB_USER: tu_usuario
      DB_PASSWORD: tu_password
      DB_NAME: tareas_db
    depends_on:
      - mi-base-datos
    networks:
      - red-aplicacion

  # --- CAPA 3: FRONTEND ---
  mi-frontend:
    image: sandiaexe/todo-frontend:latest # 🌟 
    ports:
      - "8080:80" # Mapeamos el puerto 80 interno de Nginx al 8080 de la máquina real
    depends_on:
      - mi-backend
    networks:
      - red-aplicacion

networks:
  red-aplicacion:
    driver: bridge